{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-7xl px-5 py-12 lg:px-8">
    <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
            <p class="text-sm font-black uppercase tracking-[0.25em] text-pine">Admin</p>
            <h1 class="mt-3 font-display text-5xl font-extrabold tracking-tight">Feedback</h1>
        </div>
        <a href="{{ url_for('admin_dashboard') }}" class="rounded-2xl bg-white px-6 py-3 text-center font-extrabold text-ink shadow-sm">Back to Admin</a>
    </div>

    <div class="grid gap-5">
        {% for item in feedbacks %}
            <article class="rounded-[1.75rem] border border-white/80 bg-white/85 p-6 shadow-sm">
                <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                    <div>
                        <p class="text-sm font-bold text-slate-500">{{ item.created_at.strftime('%d %b %Y, %I:%M %p') }}</p>
                        <h2 class="mt-2 text-2xl font-black">{{ item.name }}</h2>
                        <p class="mt-1 font-semibold text-pine">{{ item.email }}</p>
                        <p class="mt-4 leading-7 text-slate-700">{{ item.message }}</p>
                    </div>
                    <form method="POST" action="{{ url_for('delete_feedback', id=item.id) }}">
                        <button class="rounded-xl bg-red-50 px-4 py-2 font-bold text-red-700 hover:bg-red-100">Delete</button>
                    </form>
                </div>
            </article>
        {% else %}
            <div class="rounded-[2rem] border border-white/80 bg-white/85 p-10 text-center shadow-soft">
                <h2 class="font-display text-3xl font-extrabold">No feedback yet.</h2>
            </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
