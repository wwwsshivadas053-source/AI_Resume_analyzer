<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {% extends 'base.html' %}

{% block content %}

<div class="container mx-auto py-12">

<h1 class="text-4xl font-bold mb-8">

Feedback Messages

</h1>

{% for item in feedbacks %}

<div class="bg-white p-6 rounded-2xl shadow mb-4">

<h3 class="font-bold">

{{ item.name }}

</h3>

<p>

{{ item.email }}

</p>

<p class="mt-3">

{{ item.message }}

</p>

</div>

{% endfor %}

</div>

{% endblock %}
</body>
</html>
